<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for luxury styling -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#C5A059" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Diamond Border -->
  <rect x="100" y="100" width="300" height="300" rx="10" transform="rotate(45 250 250)" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" opacity="0.6" />
  
  <!-- Inner Diamond Border -->
  <rect x="115" y="115" width="270" height="270" rx="5" transform="rotate(45 250 250)" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-dasharray="8,4" />
  
  <!-- Decorative Accent Circles -->
  <circle cx="250" cy="50" r="4" fill="url(#goldGradient)" filter="url(#goldGlow)" />
  <circle cx="250" cy="450" r="4" fill="url(#goldGradient)" filter="url(#goldGlow)" />
  <circle cx="50" cy="250" r="4" fill="url(#goldGradient)" filter="url(#goldGlow)" />
  <circle cx="450" cy="250" r="4" fill="url(#goldGradient)" filter="url(#goldGlow)" />

  <!-- Monogram Letter "N" -->
  <text x="250" y="295" font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif" font-size="140" font-weight="300" text-anchor="middle" fill="url(#goldGradient)" filter="url(#goldGlow)" letter-spacing="2">N</text>

  <!-- Fine Floral/Classical flourish under the letter -->
  <path d="M 200 320 Q 250 335 300 320 Q 250 328 200 320 Z" fill="url(#goldGradient)" />
  <circle cx="250" cy="327" r="2.5" fill="url(#goldGradient)" />
</svg>
